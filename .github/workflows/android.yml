yaml
    name: Build APK
    
    on:
      push:
        branches:
          - main
      workflow_dispatch:
    
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-java@v4
            with:
              java-version: '17'
          - run: chmod +x gradlew && ./gradlew assembleRelease
          - uses: actions/upload-artifact@v4
            with:
              name: TVBox-APK
              path: app/build/outputs/apk/release/*.apk
